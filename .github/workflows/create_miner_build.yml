name: Create Miner Build

on:
  workflow_dispatch: # Manual trigger only
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        default: false
        type: boolean
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Import signing certificates (Developer ID Application)
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Get dependencies
        run: flutter pub get
        working-directory: ./miner-app
        env:
          GIT_TERMINAL_PROMPT: 0
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Build macOS release (no codesign)
        run: flutter build macos --release --no-codesign
        working-directory: ./miner-app

      - name: Code sign macOS App (hardened runtime)
        run: |
          cd miner-app/build/macos/Build/Products/Release/
          APP_PATH="quantus_miner.app"
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n1 | sed -E 's/.*"(.+)"$/\1/')
          if [ -z "$IDENTITY" ]; then echo "Developer ID Application identity not found"; exit 1; fi
          codesign --force --deep --options runtime --timestamp --sign "$IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create ZIP for notarization
        run: |
          cd miner-app/build/macos/Build/Products/Release/
          ditto -c -k --sequesterRsrc --keepParent quantus_miner.app quantus_miner_macos.zip

      - name: Notarize macOS App with Apple
        run: |
          cd miner-app/build/macos/Build/Products/Release/
          echo "${{ secrets.AC_API_PRIVATE_KEY }}" > /tmp/AuthKey.p8
          xcrun notarytool submit "quantus_miner_macos.zip" \
            --key /tmp/AuthKey.p8 \
            --key-id "${{ secrets.AC_API_KEY_ID }}" \
            --issuer "${{ secrets.AC_API_ISSUER_ID }}" \
            --wait

      - name: Staple notarization ticket and finalize ZIP
        run: |
          cd miner-app/build/macos/Build/Products/Release/
          xcrun stapler staple "quantus_miner.app"
          rm -f quantus_miner_macos.zip
          ditto -c -k --sequesterRsrc --keepParent quantus_miner.app quantus_miner_macos.zip

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantus_miner-macos
          path: miner-app/build/macos/Build/Products/Release/quantus_miner_macos.zip

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get
        working-directory: ./miner-app
        env:
          GIT_TERMINAL_PROMPT: 0
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Build Linux release
        run: flutter build linux --release
        working-directory: ./miner-app

      - name: Package Linux App
        run: |
          cd miner-app/build/linux/x64/release/bundle/
          tar -czvf quantus_miner_linux.tar.gz *

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantus_miner-linux
          path: miner-app/build/linux/x64/release/bundle/quantus_miner_linux.tar.gz

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get
        working-directory: ./miner-app
        env:
          GIT_TERMINAL_PROMPT: 0
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: ./miner-app

      - name: Package Windows App
        run: |
          cd miner-app/build/windows/x64/runner/Release/
          Compress-Archive -Path * -DestinationPath quantus_miner_windows.zip
        shell: powershell

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantus_miner-windows
          path: miner-app/build/windows/x64/runner/Release/quantus_miner_windows.zip

  create-release:
    name: Create Release
    if: ${{ github.event.inputs.create_release == 'true' }}
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: |
          find ./artifacts -type f -name "*.zip" -o -name "*.tar.gz" | sort

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag_name || 'v0.1.0' }}
          release_name: Quantus Miner ${{ github.event.inputs.tag_name || 'v0.1.0' }}
          body: |
            ## Quantus Miner Release
            
            This release includes binaries for:
            - 🍎 macOS (Intel/Apple Silicon)
            - 🐧 Linux (x64)
            - 🪟 Windows (x64)
            
            ### Installation
            
            **macOS**: Download the `.zip` file, extract it, and run the `quantus_miner.app`
            **Linux**: Download the `.tar.gz` file, extract it, and run the `quantus_miner` executable
            **Windows**: Download the `.zip` file, extract it, and run the `quantus_miner.exe`
            
            ### What's Changed
            - Cross-platform mining support
            - External miner integration
            - Improved UI and stability
            
            Built from commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload macOS Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/quantus_miner-macos/quantus_miner_macos.zip
          asset_name: quantus_miner_macos.zip
          asset_content_type: application/zip

      - name: Upload Linux Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/quantus_miner-linux/quantus_miner_linux.tar.gz
          asset_name: quantus_miner_linux.tar.gz
          asset_content_type: application/gzip

      - name: Upload Windows Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/quantus_miner-windows/quantus_miner_windows.zip
          asset_name: quantus_miner_windows.zip
          asset_content_type: application/zip