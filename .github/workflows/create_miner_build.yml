name: Create Miner Build
on:
  workflow_dispatch: # Manual trigger only
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-26
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Import Apple code-signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Get dependencies
        run: flutter pub get
        working-directory: ./miner-app
        env:
          GIT_TERMINAL_PROMPT: 0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Xcode project for manual signing
        run: |
          cd miner-app/macos/Runner.xcodeproj
          perl -i -pe '
            if (/33CC10FD2044A3C60003C045.*Release/../name = Release;/) {
              s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/;
              s/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/;
              s/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development";/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "";/;
              s/DEVELOPMENT_TEAM = 8BRRAHLVW5;/DEVELOPMENT_TEAM = "";/;
            }
          ' project.pbxproj

      - name: Build macOS release (unsigned, will re-sign after)
        run: |
          flutter build macos --release
        working-directory: ./miner-app

      - name: Re-sign app and frameworks with Developer ID
        run: |
          set -euo pipefail
          cd miner-app/build/macos/Build/Products/Release/
          APP_PATH="Quantus Miner.app"
          ENTITLEMENTS_PATH="$(cd ../../../../.. && pwd)/macos/Runner/Release.entitlements"
          if [ ! -f "$ENTITLEMENTS_PATH" ]; then
            echo "::error::Entitlements file not found at $ENTITLEMENTS_PATH"
            exit 1
          fi
          CERT_IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$CERT_IDENTITY" ]; then
            echo "::error::Developer ID Application certificate not found in keychain"
            security find-identity -v -p codesigning
            exit 1
          fi
          echo "Using certificate identity: $CERT_IDENTITY"
          echo "Using entitlements:        $ENTITLEMENTS_PATH"
          echo "--- Entitlements to be applied ---"
          cat "$ENTITLEMENTS_PATH"
          echo "----------------------------------"
          while IFS= read -r -d '' framework; do
            echo "Signing framework: $framework"
            codesign --force --verify --verbose --sign "$CERT_IDENTITY" \
              --options runtime --timestamp "$framework"
          done < <(find "$APP_PATH/Contents/Frameworks" -name "*.framework" -print0)
          while IFS= read -r -d '' binary; do
            if [ -f "$binary" ] && ! [[ "$binary" =~ \.framework ]]; then
              echo "Signing binary: $binary"
              codesign --force --verify --verbose --sign "$CERT_IDENTITY" \
                --options runtime --timestamp "$binary"
            fi
          done < <(find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -o -perm +111 \) -print0)
          echo "Signing app bundle: $APP_PATH"
          codesign --force --verify --verbose --sign "$CERT_IDENTITY" \
            --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS_PATH" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Verify signed app entitlements match Release.entitlements
        run: |
          set -euo pipefail
          cd miner-app/build/macos/Build/Products/Release/
          APP_PATH="Quantus Miner.app"
          ENTITLEMENTS_PATH="$(cd ../../../../.. && pwd)/macos/Runner/Release.entitlements"
          ACTUAL=$(codesign -d --entitlements :- "$APP_PATH" 2>/dev/null)
          echo "--- Entitlements embedded in signed app ---"
          echo "$ACTUAL"
          echo "-------------------------------------------"
          EXPECTED_KEYS=$(grep -oE '<key>[^<]+</key>' "$ENTITLEMENTS_PATH" | sed -E 's|</?key>||g')
          MISSING=""
          while IFS= read -r KEY; do
            [ -z "$KEY" ] && continue
            if ! grep -qF "<key>$KEY</key>" <<<"$ACTUAL"; then
              MISSING="$MISSING $KEY"
            fi
          done <<<"$EXPECTED_KEYS"
          if [ -n "$MISSING" ]; then
            echo "::error::Signed app is missing entitlements from Release.entitlements:$MISSING"
            exit 1
          fi
          if ! grep -qF '<key>com.apple.security.cs.allow-unsigned-executable-memory</key>' <<<"$ACTUAL"; then
            echo "::error::Hardened runtime entitlements missing from signed app"
            exit 1
          fi
          if [ ! -f "$APP_PATH/Contents/embedded.provisionprofile" ]; then
            RESTRICTED='keychain-access-groups|application-identifier|com\.apple\.application-identifier|aps-environment|get-task-allow|com\.apple\.developer\.'
            FOUND=$(grep -oE "<key>($RESTRICTED)[^<]*</key>" "$ENTITLEMENTS_PATH" || true)
            if [ -n "$FOUND" ]; then
              echo "::error::Restricted entitlement(s) present without embedded provisioning profile; AMFI will block launch:"
              echo "$FOUND"
              echo "Remove from $ENTITLEMENTS_PATH or ship an embedded.provisionprofile."
              exit 1
            fi
          fi
          echo "All entitlements from Release.entitlements are present in the signed app."

      - name: Smoke-launch signed app to catch AMFI/launchd rejections
        run: |
          set -euo pipefail
          cd miner-app/build/macos/Build/Products/Release/
          EXE="Quantus Miner.app/Contents/MacOS/Quantus Miner"
          "$EXE" >/tmp/miner_launch.log 2>&1 &
          PID=$!
          sleep 4
          if kill -0 "$PID" 2>/dev/null; then
            echo "Signed app launched successfully (pid=$PID); terminating."
            kill -9 "$PID" 2>/dev/null || true
            wait "$PID" 2>/dev/null || true
            exit 0
          fi
          wait "$PID" 2>/dev/null || true
          STATUS=$?
          echo "::error::Signed app failed to launch (exit=$STATUS). Recent system log:"
          cat /tmp/miner_launch.log || true
          /usr/bin/log show --predicate 'eventMessage CONTAINS "Quantus Miner"' --last 1m --info 2>&1 | tail -40 || true
          exit 1

      # Create a single ZIP that we will both notarize AND ship to users.
      # This guarantees the shipped bits are exactly what Apple accepted.
      - name: Create ZIP for notarization and distribution
        run: |
          cd miner-app/build/macos/Build/Products/Release/
          ditto -c -k --keepParent "Quantus Miner.app" quantus_miner_macos.zip

      - name: Notarize macOS App
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          cd miner-app/build/macos/Build/Products/Release/
          xcrun notarytool submit quantus_miner_macos.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantus_miner-macos
          path: miner-app/build/macos/Build/Products/Release/quantus_miner_macos.zip

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            libstdc++-14-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get
        working-directory: ./miner-app
        env:
          GIT_TERMINAL_PROMPT: 0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux release
        run: flutter build linux --release
        working-directory: ./miner-app

      - name: Package Linux App
        run: |
          cd miner-app/build/linux/x64/release/bundle/
          tar -czvf quantus_miner_linux.tar.gz *

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantus_miner-linux
          path: miner-app/build/linux/x64/release/bundle/quantus_miner_linux.tar.gz

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get
        working-directory: ./miner-app
        env:
          GIT_TERMINAL_PROMPT: 0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: ./miner-app

      - name: Package Windows App
        shell: powershell
        run: |
          cd miner-app/build/windows/x64/runner/Release/
          Compress-Archive -Path * -DestinationPath quantus_miner_windows.zip -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantus_miner-windows
          path: miner-app/build/windows/x64/runner/Release/quantus_miner_windows.zip

  create-release:
    name: Create Release
    if: ${{ inputs.create_release }}
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' miner-app/pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=miner-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: |
          # For debugging only; artifact already contains the final ZIP we want
          find ./artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -o -type d -name "*.app" | sort

      - name: Create and push git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          echo "Tag to create: $TAG"

          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Error: Tag $TAG already exists on remote."
            echo "Please update the version in pubspec.yaml before creating a new release."
            exit 1
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          release_name: Quantus Miner ${{ steps.get_version.outputs.version }}
          body: |
            ## Quantus Miner Release
            This release includes binaries for:
            - 🍎 macOS (Intel/Apple Silicon)
            - 🐧 Linux (x64)
            - 🪟 Windows (x64)
            ### Installation
            **macOS**: Download the `.zip` file, extract it, and run the `Quantus Miner.app`
            **Linux**: Download the `.tar.gz` file, extract it, and run the `quantus_miner` executable
            **Windows**: Download the `.zip` file, extract it, and run the `quantus_miner.exe`
            ### What's Changed
            - Cross-platform mining support
            - External miner integration
            - Improved UI and stability
            Built from commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload macOS Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/quantus_miner-macos/quantus_miner_macos.zip
          asset_name: quantus_miner_macos.zip
          asset_content_type: application/zip

      - name: Upload Linux Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/quantus_miner-linux/quantus_miner_linux.tar.gz
          asset_name: quantus_miner_linux.tar.gz
          asset_content_type: application/gzip

      - name: Upload Windows Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/quantus_miner-windows/quantus_miner_windows.zip
          asset_name: quantus_miner_windows.zip
          asset_content_type: application/zip