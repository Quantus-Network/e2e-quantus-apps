name: Miner - Publish Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read

jobs:
  create-tag:
    name: Create Miner Tag
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'miner-release-proposal')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.extract_version.outputs.tag }}
      version: ${{ steps.extract_version.outputs.version }}
      is_draft: ${{ steps.extract_version.outputs.is_draft }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from PR title
        id: extract_version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HAS_DRAFT_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'draft-release') }}
        run: |
          # PR title format: "ci: Miner version bump to miner-vX.Y.Z"
          TAG=$(echo "$PR_TITLE" | grep -o 'miner-v[0-9]\+\.[0-9]\+\.[0-9]\+')
          if [ -z "$TAG" ]; then
            echo "Error: Could not extract miner version from PR title: $PR_TITLE"
            exit 1
          fi
          {
            echo "tag=$TAG"
            echo "version=${TAG#miner-v}"
            echo "is_draft=$HAS_DRAFT_LABEL"
          } >> "$GITHUB_OUTPUT"
          echo "Extracted tag: $TAG"

      - name: Verify pubspec version matches tag
        env:
          MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          PUBSPEC_VERSION=$(git show "$MERGE_COMMIT:miner-app/pubspec.yaml" | grep '^version:' | head -1 | sed 's/version:[[:space:]]*//')
          if [ "$PUBSPEC_VERSION" != "$VERSION" ]; then
            echo "Error: pubspec version ($PUBSPEC_VERSION) does not match release version ($VERSION)"
            exit 1
          fi

      - name: Create and push tag
        env:
          TAG: ${{ steps.extract_version.outputs.tag }}
          MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a "$TAG" "$MERGE_COMMIT" -m "Quantus Miner release $TAG"
          git push origin "$TAG"

  build:
    name: Build Miner
    needs: create-tag
    uses: ./.github/workflows/create_miner_build.yml
    with:
      ref: ${{ needs.create-tag.outputs.tag }}
    secrets: inherit

  create-release:
    name: 🚀 Create GitHub Release
    needs: [create-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release with assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-tag.outputs.tag }}
          VERSION: ${{ needs.create-tag.outputs.version }}
          IS_DRAFT: ${{ needs.create-tag.outputs.is_draft }}
        run: |
          set -eo pipefail

          NOTES="## Quantus Miner Release
          This release includes binaries for:
          - 🍎 macOS (Intel/Apple Silicon)
          - 🐧 Linux (x64)
          - 🪟 Windows (x64)
          ### Installation
          **macOS**: Download the \`.zip\` file, extract it, and run the \`Quantus Miner.app\`
          **Linux**: Download the \`.tar.gz\` file, extract it, and run the \`quantus_miner\` executable
          **Windows**: Download the \`.zip\` file, extract it, and run the \`quantus_miner.exe\`"

          EXTRA_ARGS=()

          # Generated notes must diff against the previous miner tag, not a wallet-v* tag
          PREV_TAG=$(git tag -l "miner-v[0-9]*.[0-9]*.[0-9]*" | sort -V | grep -x -B1 "$TAG" | head -n 1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            EXTRA_ARGS+=(--notes-start-tag "$PREV_TAG")
          fi

          if [[ "$IS_DRAFT" == "true" ]]; then
            EXTRA_ARGS+=(--draft)
          fi

          gh release create "$TAG" \
            --title "Quantus Miner $VERSION" \
            --notes "$NOTES" \
            --generate-notes \
            "${EXTRA_ARGS[@]}" \
            ./artifacts/quantus_miner-macos/quantus_miner_macos.zip \
            ./artifacts/quantus_miner-linux/quantus_miner_linux.tar.gz \
            ./artifacts/quantus_miner-windows/quantus_miner_windows.zip
