name: Miner - Create Release Proposal

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch for the PR (default: main)'
        required: false
        type: string
        default: 'main'
      version_type:
        description: 'Type of version bump (major, minor, patch) or specify custom version'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Custom version string (e.g., 0.5.0). Only used if version_type is "custom". Do NOT include "miner-v" prefix'
        required: false
      is_draft:
        description: 'Is this a draft release?'
        required: true
        type: boolean
        default: false

jobs:
  calculate-next-version:
    name: 🧮 Calculate Next Miner Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.versioner.outputs.new_version }}
      source_branch: ${{ steps.vars.outputs.source_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get current branch
        id: vars
        run: |
          echo "source_branch=$(git rev-parse --abbrev-ref HEAD)" >> "$GITHUB_OUTPUT"

      - name: Get latest miner tag
        id: latest_tag
        run: |
          latest_miner_tag=$(git tag -l "miner-v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n 1)

          if [ -z "$latest_miner_tag" ]; then
            latest_miner_tag="miner-v0.0.0"
          fi

          echo "latest_tag_found=$latest_miner_tag" >> "$GITHUB_OUTPUT"
          echo "Latest miner tag found: $latest_miner_tag"

      - name: Calculate new version
        id: versioner
        env:
          LATEST_TAG: ${{ steps.latest_tag.outputs.latest_tag_found }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          CUSTOM_VERSION: ${{ github.event.inputs.custom_version }}
        run: |
          current_version=${LATEST_TAG#miner-v}

          if [[ "$VERSION_TYPE" == "custom" ]]; then
            if [[ -z "$CUSTOM_VERSION" ]]; then
              echo "Error: Custom version is selected but no custom_version string provided."
              exit 1
            fi
            if [[ ! "$CUSTOM_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: Custom version string must be in format X.Y.Z (e.g., 0.5.0)."
              exit 1
            fi
            new_version="miner-v$CUSTOM_VERSION"
          else
            IFS='.' read -r major minor patch <<< "$current_version"

            if [[ "$VERSION_TYPE" == "major" ]]; then
              major=$((major + 1))
              minor=0
              patch=0
            elif [[ "$VERSION_TYPE" == "minor" ]]; then
              minor=$((minor + 1))
              patch=0
            elif [[ "$VERSION_TYPE" == "patch" ]]; then
              patch=$((patch + 1))
            else
              echo "Error: Invalid version_type: $VERSION_TYPE"
              exit 1
            fi
            new_version="miner-v$major.$minor.$patch"
          fi

          echo "New version: $new_version"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

  update-version:
    name: 📝 Update Version & Open PR
    needs: calculate-next-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version bump branch and PR
        env:
          NEW_VERSION: ${{ needs.calculate-next-version.outputs.new_version }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_BRANCH: ${{ needs.calculate-next-version.outputs.source_branch }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
        run: |
          set -ex
          new_pubspec_version=${NEW_VERSION#miner-v}
          branch_name="release/${NEW_VERSION}"

          if git tag -l | grep -q "^${NEW_VERSION}$"; then
            echo "Error: Tag $NEW_VERSION already exists"
            exit 1
          fi

          git checkout "$SOURCE_BRANCH"
          git checkout -b "$branch_name"

          echo "Updating miner-app/pubspec.yaml to version: $new_pubspec_version"
          sed -i -E "s/^version:[[:space:]]*.+$/version: $new_pubspec_version/" miner-app/pubspec.yaml

          if ! grep -q "^version: $new_pubspec_version$" miner-app/pubspec.yaml; then
            echo "Error: Failed to update version in miner-app/pubspec.yaml"
            exit 1
          fi

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add miner-app/pubspec.yaml
          # --allow-empty: pubspec may already be at the target version (manual pre-bump)
          git commit --allow-empty -m "ci: Miner version bump to $NEW_VERSION"
          git push origin "$branch_name"

          gh label create "automated" --force --color "ededed" --description "Created by CI"
          gh label create "miner-release-proposal" --force --color "0e8a16" --description "Miner release proposal PR"
          gh label create "draft-release" --force --color "d4c5f9" --description "Release will be created as draft"

          PR_TITLE="ci: Miner version bump to $NEW_VERSION"
          PR_LABELS="automated,miner-release-proposal"
          if [[ "${{ github.event.inputs.is_draft }}" == "true" ]]; then
            PR_LABELS="$PR_LABELS,draft-release"
          fi

          cat > pr_body.md << EOF
          ## Miner Release Proposal

          This PR proposes releasing **Quantus Miner** version \`${new_pubspec_version}\` (tag \`${NEW_VERSION}\`).

          Merging this PR will automatically tag the merge commit, build macOS/Linux/Windows binaries, and publish a GitHub release.

          ### Changes
          - Updated \`miner-app/pubspec.yaml\` version to \`${new_pubspec_version}\`

          Triggered by workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Bump type: ${{ github.event.inputs.version_type }}
          EOF

          gh pr create \
            --title "$PR_TITLE" \
            --body-file pr_body.md \
            --base "$TARGET_BRANCH" \
            --head "$branch_name" \
            --label "$PR_LABELS"
