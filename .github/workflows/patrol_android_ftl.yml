# Patrol Android E2E on Firebase Test Lab (manual only).
#
# Required GitHub secrets:
#   MOBILE_APP_ENV          - mobile-app/.env contents (Supabase, Firebase API keys)
#   MOBILE_APP_ENV_TEST     - mobile-app/.env.test contents (TEST_IMPORT_MNEMONIC, etc.)
#   GOOGLE_SERVICES_JSON    - android/app/google-services.json contents
#   GCP_SA_KEY              - GCP service account JSON with Firebase Test Lab Admin
#                             (+ Firebase Analytics Viewer) on project quantus-wallet
#
# Also enable Cloud Testing API and Cloud Tool Results API on the GCP project.

name: Patrol Android FTL

on:
  workflow_dispatch:

jobs:
  patrol-android-ftl:
    name: Patrol Android (Firebase Test Lab)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MOBILE_APP_ENV: ${{ secrets.MOBILE_APP_ENV }}
      MOBILE_APP_ENV_TEST: ${{ secrets.MOBILE_APP_ENV_TEST }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GCP_PROJECT: quantus-wallet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Rust+Flutter debug builds easily exhaust the ~14 GB free on ubuntu-latest
      # (see "No space left on device" / rust-lld bus error). Reclaim unused
      # preinstalled toolchains; keep Android SDK (android: false).
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Cache crates.io / git deps only — caching rust `target/` restores huge
      # trees that then get rebuilt for Android and fill the disk.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
            ${{ runner.os }}-cargo-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # Pin Flutter: stable 3.44.5+ includes a jniLibs regression that breaks
      # Patrol/FTL-style Gradle builds (`copyJniLibsflutterBuildDebug` requires
      # `compileFlutterBuildDebug` which isn't registered). Fixed on master in
      # flutter/flutter#188805; cherry-pick to stable is pending (#189075).
      # Local builds on 3.44.0 are fine — match that here until the CP lands.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true

      # FTL device is MediumPhone.arm (arm64). Skip armv7/x86/x64 Rust targets.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: quantus-wallet

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Melos
        run: melos bootstrap

      - name: Install patrol_cli
        run: dart pub global activate patrol_cli 4.4.0

      - name: Create .env file
        run: echo "$MOBILE_APP_ENV" > mobile-app/.env

      - name: Create .env.test file
        run: echo "$MOBILE_APP_ENV_TEST" > mobile-app/.env.test

      - name: Create google-services.json
        run: echo "$GOOGLE_SERVICES_JSON" > mobile-app/android/app/google-services.json

      # Cargokit defaults to arm + arm64 (+ x86/x64 in debug). FTL only needs
      # arm64-v8a; ONLY_ARM64 also sets ndk.abiFilters in app/build.gradle.
      - name: Limit Android ABIs to arm64
        run: echo "ONLY_ARM64=true" >> mobile-app/android/gradle.properties

      - name: Build Patrol Android APKs (safe suite)
        working-directory: ./mobile-app
        env:
          # Lower peak disk from parallel -Zbuild-std compiles.
          CARGO_BUILD_JOBS: "2"
        run: |
          patrol build android --debug \
            --dart-define-from-file=.env.test \
            -t patrol_test/flows/create_wallet_test.dart \
            -t patrol_test/flows/import_wallet_test.dart \
            -t patrol_test/flows/view_recovery_phrase_test.dart

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patrol-android-apks
          path: |
            mobile-app/build/app/outputs/apk/debug/app-debug.apk
            mobile-app/build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          if-no-files-found: error
          retention-days: 7

      - name: Run on Firebase Test Lab
        working-directory: ./mobile-app
        run: scripts/patrol_android_ftl.sh
