name: quantus_miner
description: Quantus PoW miner (desktop / mobile)
version: 0.3.1
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # Workspace packages (managed by melos.yaml)
  quantus_sdk: # Version managed by melos.yaml
  
  # Networking and storage
  http: # Version managed by melos.yaml
  shared_preferences: # Version managed by melos.yaml
  flutter_secure_storage: # Version managed by melos.yaml
  polkadart: # For local node RPC queries
  
  # Mnemonic generation
  bip39_mnemonic: # Version managed by melos.yaml
  
  # Routing
  go_router: # Version managed by melos.yaml
  
  # UI and utilities
  flutter_svg: # Version managed by melos.yaml
  
  # System and file operations
  path: # Version managed by melos.yaml
  path_provider: # Version managed by melos.yaml
  permission_handler: # Version managed by melos.yaml
  image_picker: # Version managed by melos.yaml
  
  # Math and logging
  decimal: # Version managed by melos.yaml
  logger: # Version managed by melos.yaml
  flash: ^3.1.1
  lucide_icons_flutter: ^3.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: # Version managed by melos.yaml
  integration_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true
  assets:
    - assets/quantus_icon.svg
    - assets/logo/
    - assets/tr-ee-u1vxT1-qrcode-black.png
    - assets/tr-ee-u1vxT1-qrcode-white.png
    - assets/tr-ee-u1vxT1-qrcode-black.svg
    - assets/tr-ee-u1vxT1-qrcode-white.svg
  