name: quantus_miner
description: Quantus PoW miner (desktop / mobile)
version: 0.4.5
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

# Convention: see dependency placement section in ../melos.yaml.
# Shared dep versions must match the canonical list there.
dependencies:
  flutter:
    sdk: flutter

  # quantus_sdk re-exports polkadart, bip39_mnemonic, ss58 etc.
  # so miner-app doesn't list them directly.
  quantus_sdk:

  # Shared (canonical versions in melos.yaml)
  convert: ^3.1.2
  http: ^1.6.0
  shared_preferences: ^2.5.5
  path: ^1.9.1
  flutter_svg: ^2.3.0
  flash: ^3.1.1
  telemetrydecksdk: ^3.0.0

  # Miner-only
  go_router: ^17.2.2
  logger: ^2.7.0
  lucide_icons_flutter: ^3.1.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  analyzer: ^10.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/quantus_icon.svg
    - assets/logo/
    - assets/tr-ee-u1vxT1-qrcode-black.png
    - assets/tr-ee-u1vxT1-qrcode-white.png
    - assets/tr-ee-u1vxT1-qrcode-black.svg
    - assets/tr-ee-u1vxT1-qrcode-white.svg
