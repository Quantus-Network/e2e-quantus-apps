plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load keystore properties
def keystorePropertiesFile = rootProject.file('key.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.example.resonance_network_wallet"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "28.2.13676358"
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    // Define signing configurations
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
        // debug signingConfig is predefined by Android
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.quantus.wallet"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        multiDexEnabled true

        // Patrol native automation: run integration tests through Patrol's JUnit
        // runner. `clearPackageData` wipes app data between test runs so each
        // Dart test starts from a clean state (mirrors iOS --full-isolation).
        testInstrumentationRunner "pl.leancode.patrol.PatrolJUnitRunner"
        testInstrumentationRunnerArguments clearPackageData: "true"

        // CI / FTL: set ONLY_ARM64=true in gradle.properties to skip armv7/x86
        // Rust+Flutter ABIs (saves ~tens of GB on GitHub runners).
        if (project.hasProperty('ONLY_ARM64') && project.property('ONLY_ARM64').toString().toBoolean()) {
            ndk {
                abiFilters 'arm64-v8a'
            }
        }
    }

    testOptions {
        execution "ANDROIDX_TEST_ORCHESTRATOR"
    }

    buildTypes {
        release {
            // Use the release signing config
            signingConfig = signingConfigs.release
            // TODO: You might want to enable ProGuard/R8 for code shrinking and obfuscation
            // minifyEnabled true
            // shrinkResources true
            // proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        // debug build type uses signingConfigs.debug by default
    }
}

tasks.register('generateVersion', Exec) {
    commandLine '/bin/sh', "${rootProject.projectDir}/../tool/generate_version.sh"
}

// Hook lazily: eager tasks.matching().each in afterEvaluate can force Flutter
// task realization in the wrong order (e.g. copyJniLibsflutterBuildRelease
// before compileFlutterBuildRelease exists), which breaks Patrol/debug builds.
tasks.configureEach { task ->
    if (task.name.startsWith("compileFlutterBuild")) {
        task.dependsOn generateVersion
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    // Patrol native automation: AndroidX Test Orchestrator runs each Dart test
    // in its own instrumentation invocation (required by ANDROIDX_TEST_ORCHESTRATOR).
    androidTestUtil 'androidx.test:orchestrator:1.5.1'
}

// Apply cargokit directly to the main app
apply from: "../../../quantus_sdk/rust_builder/cargokit/gradle/plugin.gradle"
cargokit {
    manifestDir = "../../../quantus_sdk/rust"
    libname = "rust_lib_quantus_wallet"
}
