name: resonance_network_wallet
description: A Flutter wallet for the Quantus blockchain.
publish_to: "none"

version: 1.3.4+99

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.1
  quantus_sdk:
  video_player:
  qr_flutter:
  flutter_svg:
  mobile_scanner:
  flutter_native_splash:
  cupertino_icons:
  flash:
  flutter_launcher_icons:
  local_auth: ^2.1.6

  decimal:
  hex:
  base32: ^2.0.0
  ss58:
  bip39_mnemonic:
  intl:
  quiver:
  convert:
  crypto:

  shared_preferences:
  flutter_secure_storage:
  http:

  human_checksum:
    git:
      url: https://github.com/Quantus-Network/qp-human-checkphrase.git
      ref: v2.0.1
      path: dart
  provider: ^6.1.5
  polkadart: ^0.7.1
  share_plus: ^12.0.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  telemetrydecksdk: ^3.0.0
  async: ^2.13.0
  app_links: ^6.4.1
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.5.2
  play_install_referrer: ^0.5.0
  connectivity_plus: ^7.0.0
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  collection: ^1.19.1
  glass_kit: ^4.0.2
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  image_picker: ^1.2.1
  flutter_inset_shadow: ^2.0.3
  liquid_glass_renderer: ^0.2.0-dev.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  riverpod_generator: ^2.6.5
  build_runner: ^2.5.4
  mockito: ^5.4.6
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/testnet_data/
    - assets/text/human_checkphrase_final_wordlist.txt
    - assets/send_icon.png
    - assets/receive_icon.png
    - assets/swap_icon_1.svg
    - assets/scan_1.svg
    - assets/paste_icon_1.svg
    - assets/active_dot.png
    - assets/receive_line.svg
    - assets/bridge_icon.svg
    - assets/hourglass.svg
    - assets/settings_icon_off.svg
    - assets/notification/
    - assets/transaction/
    - assets/send_btn_decoration.png
    - assets/receive_btn_decoration.png
    - assets/notification/notification_top_icon.png
    - assets/high_security/security_icon_big.svg
    - assets/high_security/step_indicator_active_icon.svg
    - assets/high_security/step_indicator_icon.svg
    - assets/high_security/big_red_button_icon.png
    - assets/high_security/intercept_icon.svg
    - assets/quests/quests_top_logo.png
    - assets/v2/green_checkmark.png
    - assets/v2/pin_number_background.png
    - assets/v2/caret_left.svg
    - assets/v2/send_button.png
    - assets/v2/receive_button.png
    - assets/v2/swap_button.png
    - assets/v2/glass_circle_icon_button_bg.png
    - assets/v2/action_receive.svg
    - assets/v2/action_send.svg
    - assets/v2/action_swap.svg
    - assets/v2/uppercase_q.svg
    - assets/v2/uppercase_q.png
    - assets/v2/swap_arrows_down_up.svg
    - assets/v2/swap_clock_counter_clockwise.svg
    - assets/v2/swap_qr_code.svg
    - assets/v2/auth_wrapper_bracket.png
    - assets/v2/gradient_background.png
    - assets/v2/welcome_screen_bg_image.jpg
    - assets/v2/quantus_orange_logo.png


  fonts:
    - family: Fira Code
      fonts:
        - asset: assets/fonts/FiraCode-Light.ttf
          weight: 100
        - asset: assets/fonts/FiraCode-Regular.ttf
          weight: 400
        - asset: assets/fonts/FiraCode-Medium.ttf
          weight: 500
        - asset: assets/fonts/FiraCode-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/FiraCode-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Light.ttf
          weight: 300
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/GeistMono-Light.ttf
          weight: 300
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/GeistMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/GeistMono-Bold.ttf
          weight: 700

flutter_native_splash:
  background_image: assets/v2/welcome_screen_bg_image.jpg
  image: assets/v2/quantus_orange_logo.png
  android: true
  ios: true

  android_12:
    image: assets/v2/android12_icon_empty_1152.png
    color: "#141414"
    icon_background_color: "#141414"
    branding: assets/v2/android12_branding_800x320.png
    branding_bottom_padding: 88
