name: resonance_network_wallet
description: A Flutter wallet for the Quantus blockchain.
publish_to: "none"

version: 1.5.3+111

environment:
  sdk: ">=3.8.0 <4.0.0"

# Convention: see dependency placement section in ../melos.yaml.
# Shared dep versions must match the canonical list there.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  quantus_sdk:

  # Shared (canonical versions in melos.yaml)
  convert: ^3.1.2
  http: ^1.6.0
  shared_preferences: ^2.5.5
  decimal: ^3.2.4
  flutter_svg: ^2.3.0
  flash: ^3.1.1
  collection: ^1.19.1
  telemetrydecksdk: ^3.0.0

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # UI
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.2

  # Auth, sharing, links
  url_launcher: ^6.3.2
  local_auth: ^3.0.1
  share_plus: ^13.1.0
  app_links: ^7.0.0

  # Config + backend
  flutter_dotenv: ^6.0.1
  supabase_flutter: ^2.12.4
  play_install_referrer: ^0.5.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2

  # Utility
  async: ^2.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^4.0.3
  mockito: ^5.6.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/testnet_data/
    - assets/text/human_checkphrase_final_wordlist.txt
    - assets/notification/
    - assets/notification/notification_top_icon.png
    - assets/v2/green_checkmark.png
    - assets/v2/caret_left.svg
    - assets/v2/action_receive.svg
    - assets/v2/action_send.svg
    - assets/v2/action_swap.svg
    - assets/v2/uppercase_q.svg
    - assets/v2/uppercase_q.png
    - assets/v2/axe.svg
    - assets/v2/uppercase_q_black_bg.png
    - assets/v2/swap_arrows_down_up.svg
    - assets/v2/swap_clock_counter_clockwise.svg
    - assets/v2/swap_qr_code.svg
    - assets/v2/auth_wrapper_bracket.png
    - assets/v2/splash_background.jpg
    - assets/v2/ascii_background.png
    - assets/v2/quantus_orange_logo.png


  fonts:
    - family: Fira Code
      fonts:
        - asset: assets/fonts/FiraCode-Light.ttf
          weight: 100
        - asset: assets/fonts/FiraCode-Regular.ttf
          weight: 400
        - asset: assets/fonts/FiraCode-Medium.ttf
          weight: 500
        - asset: assets/fonts/FiraCode-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/FiraCode-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Light.ttf
          weight: 300
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/GeistMono-Light.ttf
          weight: 300
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/GeistMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/GeistMono-Bold.ttf
          weight: 700

flutter_native_splash:
  background_image: assets/v2/splash_background.jpg
  color: "#0E0E0E"
  image: assets/v2/uppercase_q.png
  android: true
  ios: true

  android_12:
    image: assets/v2/android12_icon_empty_1152.png
    color: "#0E0E0E"
    icon_background_color: "#0E0E0E"
    branding: assets/v2/uppercase_q.png
    branding_bottom_padding: 88
