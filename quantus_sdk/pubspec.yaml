name: quantus_sdk
description: Shared Quantus Dart + Rust bindings and services
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

# Convention: see dependency placement section in ../melos.yaml.
# Shared dep versions must match the canonical list there.
dependencies:
  flutter:
    sdk: flutter

  rust_lib_quantus_wallet:
    path: ./rust_builder
  flutter_rust_bridge: ^2.12.0

  # Shared (canonical versions in melos.yaml)
  # DO NOT UPDATE polkadart - newer versions are incompatible with our ML-DSA
  # signature override, work completely differently, and add no benefits.
  # Re-exported from quantus_sdk.dart so apps don't need a direct polkadart dep.
  polkadart: ^0.7.3
  bip39_mnemonic: ^4.0.1
  convert: ^3.1.2
  http: ^1.6.0
  shared_preferences: ^2.5.5
  decimal: ^3.2.4
  path: ^1.9.1
  flash: ^3.1.1
  collection: ^1.19.1

  # SDK-only
  ss58: ^1.3.1
  intl: ^0.20.2
  flutter_secure_storage: ^10.1.0
  connectivity_plus: ^7.1.1
  path_provider: ^2.1.5

  human_checksum:
    git:
      url: https://github.com/Quantus-Network/qp-human-checkphrase.git
      ref: v2.2.0
      path: dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # DO NOT UPDATE polkadart_cli - must match polkadart 0.7.x. See note above.
  polkadart_cli: ^0.7.1

polkadart:
  output_dir: lib/generated
  chains:
    planck: wss://a1-planck.quantus.cat
