[package]
name = "rust_lib_resonance_network_wallet"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
# NOTE: Quantus chain dependencies.
qp-poseidon = { version = "1", default-features = false }
qp-poseidon-core = { version = "1", default-features = false }
qp-rusty-crystals-dilithium = { version = "2", default-features = false }
qp-rusty-crystals-hdwallet = { version = "2" }

# ZK proof generation for wormhole withdrawals
qp-wormhole-circuit = { version = "1", default-features = false, features = ["std"] }
qp-wormhole-prover = { version = "1", default-features = false, features = ["std"] }
qp-wormhole-aggregator = { version = "1", default-features = false, features = ["rayon", "std"] }
qp-wormhole-inputs = { version = "1", default-features = false, features = ["std"] }
qp-zk-circuits-common = { version = "1", default-features = false, features = ["std"] }
qp-wormhole-circuit-builder = { version = "1", default-features = false }
plonky2 = { package = "qp-plonky2", version = "1.1.3", default-features = false, features = ["std"] }

# Serialization for proof config
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"

flutter_rust_bridge = "=2.11.1"
hex = "0.4.3"
log = "0.4"
nam-tiny-hderive = "0.3.1-nam.0"
sp-core = "35.0.0"
quantus_ur = { git = "https://github.com/Quantus-Network/quantus_ur.git", tag = "1.1.0" }

# Substrate codec for storage proof processing
codec = { package = "parity-scale-codec", version = "3.7", features = ["derive"] }

# Force std feature on sp-externalities to fix thread_local macro issue
sp-externalities = { version = "0.31", features = ["std"] }

[build-dependencies]
qp-wormhole-circuit-builder = { version = "1", default-features = false }

[patch.crates-io]
# Quantus dependencies - use git branches for testnet development
qp-poseidon = { git = "https://github.com/Quantus-Network/qp-poseidon.git", branch = "illuzen/injective-to-felts" }
qp-poseidon-core = { git = "https://github.com/Quantus-Network/qp-poseidon.git", branch = "illuzen/injective-to-felts" }
qp-rusty-crystals-dilithium = { git = "https://github.com/Quantus-Network/qp-rusty-crystals.git", branch = "illuzen/new-poseidon-api" }
qp-rusty-crystals-hdwallet = { git = "https://github.com/Quantus-Network/qp-rusty-crystals.git", branch = "illuzen/new-poseidon-api" }
qp-wormhole-circuit = { git = "https://github.com/Quantus-Network/qp-zk-circuits.git", branch = "illuzen/non-injectivity" }
qp-wormhole-prover = { git = "https://github.com/Quantus-Network/qp-zk-circuits.git", branch = "illuzen/non-injectivity" }
qp-wormhole-aggregator = { git = "https://github.com/Quantus-Network/qp-zk-circuits.git", branch = "illuzen/non-injectivity" }
qp-wormhole-inputs = { git = "https://github.com/Quantus-Network/qp-zk-circuits.git", branch = "illuzen/non-injectivity" }
qp-zk-circuits-common = { git = "https://github.com/Quantus-Network/qp-zk-circuits.git", branch = "illuzen/non-injectivity" }
qp-wormhole-circuit-builder = { git = "https://github.com/Quantus-Network/qp-zk-circuits.git", branch = "illuzen/non-injectivity" }
# qp-plonky2 needs to use matching qp-poseidon-core for consistent Poseidon2 hashing
qp-plonky2 = { git = "https://github.com/Quantus-Network/qp-plonky2.git", branch = "illuzen/new-rate" }
qp-plonky2-core = { git = "https://github.com/Quantus-Network/qp-plonky2.git", branch = "illuzen/new-rate" }
qp-plonky2-field = { git = "https://github.com/Quantus-Network/qp-plonky2.git", branch = "illuzen/new-rate" }
qp-plonky2-verifier = { git = "https://github.com/Quantus-Network/qp-plonky2.git", branch = "illuzen/new-rate" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }

# Optimize build scripts and their dependencies in dev mode.
# This is critical for circuit generation which is CPU-intensive.
# Without this, circuit generation takes ~10 minutes instead of ~30 seconds.
[profile.dev.build-override]
opt-level = 3

[profile.release.build-override]
opt-level = 3
