[package]
name = "rust_lib_resonance_network_wallet"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
# NOTE: Quantus chain dependencies.
qp-poseidon = { version = "0.9.5", default-features = false }
qp-rusty-crystals-dilithium = { version = "1.0.3", default-features = false }
qp-rusty-crystals-hdwallet = { version = "0.1.4" }

bip39 = "2.1.0"
flutter_rust_bridge = "=2.11.1"
hex = "0.4.3"
nam-tiny-hderive = "0.3.1-nam.0"
sp-core = "35.0.0"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
